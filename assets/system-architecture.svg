<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="620" viewBox="0 0 1400 620" role="img" aria-labelledby="title desc">
  <title id="title">MineCombat-Evaluation System Architecture</title>
  <desc id="desc">Agent policy connects through Python client and TCP JSON protocol to a Paper plugin controlling Minecraft combat episodes.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#07111f"/>
      <stop offset="55%" stop-color="#0b1d32"/>
      <stop offset="100%" stop-color="#061018"/>
    </linearGradient>
    <linearGradient id="card" x1="0" x2="1">
      <stop offset="0%" stop-color="#102943"/>
      <stop offset="100%" stop-color="#0a1b2d"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="12" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#2dd4ff"/>
    </marker>
  </defs>
  <rect width="1400" height="620" fill="url(#bg)"/>
  <g opacity="0.25" stroke="#2dd4ff" stroke-width="1">
    <path d="M80 90h170m-120 40h220m-70 400h260m610-440h170m-90 380h220"/>
    <path d="M1040 90l40 40h210M90 520l60-60h190"/>
  </g>
  <text x="70" y="70" fill="#f8fafc" font-family="Inter, Arial, sans-serif" font-size="36" font-weight="700">MineCombat-Evaluation Architecture</text>
  <text x="70" y="106" fill="#7dd3fc" font-family="Inter, Arial, sans-serif" font-size="18">Versioned benchmark suites, TCP JSON control, reproducible world artifact</text>

  <g filter="url(#shadow)">
    <rect x="70" y="190" rx="20" ry="20" width="230" height="170" fill="url(#card)" stroke="#2563eb"/>
    <text x="105" y="245" fill="#f8fafc" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700">Agent Policy</text>
    <text x="105" y="285" fill="#bae6fd" font-family="Inter, Arial, sans-serif" font-size="16">Policy.act(obs, tick)</text>
    <text x="105" y="315" fill="#93c5fd" font-family="Inter, Arial, sans-serif" font-size="14">LLM / RL / heuristic</text>

    <rect x="390" y="160" rx="20" ry="20" width="250" height="230" fill="url(#card)" stroke="#0891b2"/>
    <text x="425" y="215" fill="#f8fafc" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700">Python Client</text>
    <text x="425" y="255" fill="#bae6fd" font-family="Inter, Arial, sans-serif" font-size="16">run_eval.py</text>
    <text x="425" y="285" fill="#bae6fd" font-family="Inter, Arial, sans-serif" font-size="16">run_suite.py</text>
    <text x="425" y="315" fill="#bae6fd" font-family="Inter, Arial, sans-serif" font-size="16">minecombat-eval CLI</text>
    <text x="425" y="350" fill="#93c5fd" font-family="Inter, Arial, sans-serif" font-size="14">JSONL logs + summaries</text>

    <rect x="735" y="190" rx="20" ry="20" width="240" height="170" fill="url(#card)" stroke="#22d3ee"/>
    <text x="770" y="245" fill="#f8fafc" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700">TCP JSON v1</text>
    <text x="770" y="285" fill="#bae6fd" font-family="Inter, Arial, sans-serif" font-size="16">reset ’ observation</text>
    <text x="770" y="315" fill="#bae6fd" font-family="Inter, Arial, sans-serif" font-size="16">action ’ step_result</text>

    <rect x="1065" y="135" rx="20" ry="20" width="265" height="280" fill="url(#card)" stroke="#10b981"/>
    <text x="1100" y="190" fill="#f8fafc" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700">Paper Plugin</text>
    <text x="1100" y="230" fill="#bbf7d0" font-family="Inter, Arial, sans-serif" font-size="16">episode reset</text>
    <text x="1100" y="260" fill="#bbf7d0" font-family="Inter, Arial, sans-serif" font-size="16">gear + hostiles</text>
    <text x="1100" y="290" fill="#bbf7d0" font-family="Inter, Arial, sans-serif" font-size="16">success/fail/timeout</text>
    <text x="1100" y="320" fill="#bbf7d0" font-family="Inter, Arial, sans-serif" font-size="16">observation encoder</text>
    <text x="1100" y="365" fill="#93c5fd" font-family="Inter, Arial, sans-serif" font-size="14">Minecraft 26.1 / Paper 26.1.2</text>
  </g>

  <path d="M300 275h85" stroke="#2dd4ff" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M640 275h90" stroke="#2dd4ff" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M975 275h85" stroke="#2dd4ff" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M1065 355 C860 490, 560 485, 310 355" stroke="#38bdf8" stroke-width="3" fill="none" stroke-dasharray="10 10" marker-end="url(#arrow)"/>
  <text x="570" y="500" fill="#7dd3fc" font-family="Inter, Arial, sans-serif" font-size="16">observations, terminal outcomes, JSONL logs</text>

  <g>
    <rect x="70" y="455" width="1260" height="90" rx="18" fill="#061827" stroke="#1e40af"/>
    <text x="105" y="505" fill="#f8fafc" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">Reproducibility bundle:</text>
    <text x="330" y="505" fill="#bae6fd" font-family="Inter, Arial, sans-serif" font-size="18">PyPI package · Docker · GitHub Release · mcbench_flat-v1 world zip · manifest + SHA256</text>
  </g>
</svg>
