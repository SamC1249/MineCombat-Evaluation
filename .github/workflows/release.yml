name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      world_zip: ${{ steps.meta.outputs.world_zip }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build wheel and sdist
        run: |
          python -m pip install --upgrade pip build
          python -m build

      - name: Read version and world metadata
        id: meta
        run: |
          python - <<'PY'
          import json
          import os
          import pathlib
          import tomllib

          py = tomllib.loads(pathlib.Path('pyproject.toml').read_text())
          version = py['project']['version']
          manifest = json.loads(pathlib.Path('artifacts/manifest.json').read_text())
          world_zip = manifest['world']['zip_file']

          out = pathlib.Path(os.environ['GITHUB_OUTPUT'])
          with out.open('a') as fh:
            fh.write(f'version={version}\n')
            fh.write(f'world_zip={world_zip}\n')
          PY

      - name: Prepare release assets
        run: |
          mkdir -p release-assets
          cp artifacts/manifest.json release-assets/manifest.json
          cp "artifacts/world/${{ steps.meta.outputs.world_zip }}" "release-assets/${{ steps.meta.outputs.world_zip }}"
          cp dist/* release-assets/
          sha256sum release-assets/* > release-assets/SHA256SUMS.txt

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-assets
          path: release-assets/*

  github-release:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download release assets
        uses: actions/download-artifact@v4
        with:
          name: release-assets
          path: release-assets

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_type == 'tag' && github.ref_name || format('v{0}', needs.build.outputs.version) }}
          generate_release_notes: true
          files: |
            release-assets/*
          body: |
            ## MineCombat-Evaluation ${{ needs.build.outputs.version }}

            This release includes:
            - Python package distributions (`.whl`, `.tar.gz`)
            - Versioned world artifact (`${{ needs.build.outputs.world_zip }}`)
            - Bootstrap manifest (`manifest.json`)
            - Checksums (`SHA256SUMS.txt`)

            Install from PyPI:
            ```bash
            pip install minecombat-eval
            ```

  publish-pypi:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: pypi
      url: https://pypi.org/p/minecombat-eval
    permissions:
      id-token: write
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-assets
          path: release-assets

      - name: Keep only Python distributions for PyPI
        run: |
          mkdir -p pypi-dist
          cp release-assets/*.whl release-assets/*.tar.gz pypi-dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: pypi-dist
